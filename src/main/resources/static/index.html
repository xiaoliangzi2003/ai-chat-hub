<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatAIHub — DeepSeek 智能对话</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Markdown 渲染 + 代码高亮 + XSS防护 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
    <style>
        :root {
            --bg:        #0d0f14;
            --surface:   #141720;
            --surface2:  #1c2030;
            --surface3:  #242840;
            --border:    rgba(255,255,255,0.07);
            --border2:   rgba(255,255,255,0.12);
            --accent:    #5b8af5;
            --accent2:   #7ca3f8;
            --accent-glow: rgba(91,138,245,0.25);
            --user-msg:  #2a3c6e;
            --success:   #34c987;
            --warning:   #f5a623;
            --error:     #f05a5a;
            --text:      #e2e8f4;
            --text-dim:  #8a93b0;
            --text-faint:#4a5270;
            --radius-sm: 6px;
            --radius:    12px;
            --radius-lg: 18px;
            --shadow:    0 8px 32px rgba(0,0,0,0.4);
            --trans:     all 0.2s ease;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Sans SC', sans-serif;
            font-size: 14px;
            line-height: 1.65;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 99px; }

        /* ── LAYOUT ── */
        .app {
            display: flex;
            height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            min-width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-logo {
            padding: 20px 18px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.5px;
        }

        .sidebar-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .btn-new-session {
            width: 100%;
            padding: 9px 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            transition: var(--trans);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .btn-new-session:hover {
            background: var(--accent2);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .session-item {
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--trans);
            font-size: 13px;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .session-item::before {
            content: '◎';
            font-size: 10px;
            flex-shrink: 0;
            color: var(--text-faint);
        }

        .session-item:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .session-item.active {
            background: rgba(91,138,245,0.15);
            color: var(--accent2);
            font-weight: 500;
        }

        .session-item.active::before {
            color: var(--accent);
        }

        .empty-session {
            text-align: center;
            color: var(--text-faint);
            font-size: 12px;
            padding: 24px 0;
        }

        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .topbar-label {
            font-size: 12px;
            color: var(--text-faint);
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .topbar-input {
            flex: 1;
            padding: 7px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 13px;
            font-family: 'Space Mono', monospace;
            outline: none;
            transition: var(--trans);
            min-width: 0;
        }

        .topbar-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .btn-save {
            padding: 7px 14px;
            background: var(--surface3);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            white-space: nowrap;
            transition: var(--trans);
        }

        .btn-save:hover {
            color: var(--text);
            border-color: var(--border2);
        }

        .btn-logout {
            padding: 7px 14px;
            background: transparent;
            color: var(--error);
            border: 1px solid rgba(240,90,90,0.3);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            white-space: nowrap;
            transition: var(--trans);
            display: none;
        }

        .btn-logout:hover {
            background: rgba(240,90,90,0.1);
        }

        /* ── CONTENT AREA ── */
        .content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── AUTH PANEL ── */
        .auth-panel {
            width: 100%;
            max-width: 440px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .auth-header {
            padding: 28px 28px 0;
            text-align: center;
        }

        .auth-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            margin: 0 auto 12px;
        }

        .auth-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .auth-subtitle {
            font-size: 13px;
            color: var(--text-dim);
            margin-bottom: 20px;
        }

        .auth-tabs {
            display: flex;
            gap: 2px;
            padding: 4px;
            background: var(--surface2);
            border-radius: var(--radius-sm);
            margin: 0 28px 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 7px;
            text-align: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-dim);
            transition: var(--trans);
            user-select: none;
        }

        .auth-tab.active {
            background: var(--surface3);
            color: var(--text);
            font-weight: 500;
        }

        .auth-form {
            display: none;
            padding: 0 28px 28px;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: var(--trans);
        }

        .form-group input::placeholder { color: var(--text-faint); }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .code-row {
            display: flex;
            gap: 8px;
            align-items: flex-start;
        }

        .code-row input { flex: 1; }

        .btn-send-code {
            padding: 10px 14px;
            background: var(--surface3);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            white-space: nowrap;
            transition: var(--trans);
            flex-shrink: 0;
        }

        .btn-send-code:hover:not(.disabled) {
            color: var(--accent2);
            border-color: var(--accent);
        }

        .btn-send-code.disabled {
            cursor: not-allowed;
            color: var(--text-faint);
            opacity: 0.6;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            margin-top: 4px;
            transition: var(--trans);
        }

        .btn-submit:hover {
            background: var(--accent2);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        /* ── CHAT PANEL ── */
        .chat-panel {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: var(--text-faint);
        }

        .chat-empty-icon {
            font-size: 48px;
            opacity: 0.4;
        }

        .chat-empty-hint {
            font-size: 13px;
            text-align: center;
            max-width: 260px;
            line-height: 1.8;
        }

        .chat-message {
            display: flex;
            gap: 10px;
            max-width: 78%;
            animation: msgIn 0.18s ease;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .chat-message.user {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .user .msg-avatar {
            background: var(--user-msg);
        }

        .assistant .msg-avatar {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
        }

        .message-bubble {
            padding: 11px 15px;
            border-radius: var(--radius);
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
        }

        .user .message-bubble {
            background: var(--user-msg);
            color: var(--text);
            border-top-right-radius: 4px;
        }

        .assistant .message-bubble {
            background: var(--surface2);
            color: var(--text);
            border-top-left-radius: 4px;
            border: 1px solid var(--border);
        }

        /* ── INPUT BAR ── */
        .input-bar {
            padding: 16px 24px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            flex-shrink: 0;
        }

        .input-bar-top {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .mode-select {
            padding: 7px 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-dim);
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: var(--trans);
        }

        .mode-select:focus {
            border-color: var(--accent);
        }

        .mode-select option {
            background: var(--surface2);
        }

        .input-wrap {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            resize: none;
            height: 80px;
            outline: none;
            transition: var(--trans);
            line-height: 1.6;
        }

        .chat-input::placeholder { color: var(--text-faint); }

        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .input-bar-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-faint);
        }

        .input-actions {
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            font-weight: 500;
            transition: var(--trans);
            border: 1px solid transparent;
        }

        .btn-send {
            background: var(--accent);
            color: #fff;
        }

        .btn-send:hover {
            background: var(--accent2);
            box-shadow: 0 0 16px var(--accent-glow);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-clear-mem {
            background: transparent;
            color: var(--text-dim);
            border-color: var(--border);
        }

        .btn-clear-mem:hover {
            color: var(--warning);
            border-color: rgba(245,166,35,0.4);
            background: rgba(245,166,35,0.06);
        }

        /* ── LOADING DOTS ── */
        .loading-dots {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 4px 0;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: dot-bounce 1.2s ease-in-out infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success { background: var(--success); color: #0a1f14; }
        .toast.error   { background: var(--error);   color: #fff; }
        .toast.warning { background: var(--warning);  color: #1a0e00; }
        .toast.info    { background: var(--surface3); color: var(--text); border: 1px solid var(--border2); }

        /* ── DIVIDER in content ── */
        .content-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        /* ── MARKDOWN 渲染样式 ── */
        .message-bubble.markdown-body {
            font-size: 14px;
            line-height: 1.7;
        }

        .message-bubble.markdown-body p {
            margin: 0 0 8px;
        }

        .message-bubble.markdown-body p:last-child {
            margin-bottom: 0;
        }

        .message-bubble.markdown-body pre {
            background: #0d1117;
            border: 1px solid var(--border2);
            border-radius: var(--radius-sm);
            padding: 14px;
            overflow-x: auto;
            margin: 10px 0;
            position: relative;
        }

        .message-bubble.markdown-body pre code {
            background: none;
            padding: 0;
            border-radius: 0;
            font-size: 13px;
            font-family: 'Space Mono', 'Consolas', 'Monaco', monospace;
            color: #e6edf3;
        }

        .message-bubble.markdown-body code {
            background: rgba(255,255,255,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: 'Space Mono', 'Consolas', monospace;
            color: var(--accent2);
        }

        .message-bubble.markdown-body ul,
        .message-bubble.markdown-body ol {
            padding-left: 20px;
            margin: 6px 0;
        }

        .message-bubble.markdown-body li {
            margin: 3px 0;
        }

        .message-bubble.markdown-body blockquote {
            border-left: 3px solid var(--accent);
            padding: 4px 12px;
            margin: 8px 0;
            color: var(--text-dim);
            background: rgba(91,138,245,0.05);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
        }

        .message-bubble.markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
            font-size: 13px;
        }

        .message-bubble.markdown-body th,
        .message-bubble.markdown-body td {
            border: 1px solid var(--border2);
            padding: 6px 10px;
            text-align: left;
        }

        .message-bubble.markdown-body th {
            background: var(--surface3);
            font-weight: 500;
        }

        .message-bubble.markdown-body h1,
        .message-bubble.markdown-body h2,
        .message-bubble.markdown-body h3,
        .message-bubble.markdown-body h4 {
            margin: 12px 0 6px;
            font-weight: 600;
            color: var(--text);
        }

        .message-bubble.markdown-body h1 { font-size: 18px; }
        .message-bubble.markdown-body h2 { font-size: 16px; }
        .message-bubble.markdown-body h3 { font-size: 15px; }

        .message-bubble.markdown-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0;
        }

        .message-bubble.markdown-body a {
            color: var(--accent2);
            text-decoration: none;
        }

        .message-bubble.markdown-body a:hover {
            text-decoration: underline;
        }

        .message-bubble.markdown-body img {
            max-width: 100%;
            border-radius: var(--radius-sm);
        }

        /* 代码块复制按钮 */
        .code-block-wrapper {
            position: relative;
        }

        .code-copy-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            padding: 3px 8px;
            background: var(--surface3);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .code-block-wrapper:hover .code-copy-btn {
            opacity: 1;
        }

        .code-copy-btn:hover {
            color: var(--text);
            background: var(--surface2);
        }

        /* 流式光标闪烁 */
        .streaming-cursor::after {
            content: '▎';
            animation: blink 0.8s step-end infinite;
            color: var(--accent);
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .sidebar { width: 200px; min-width: 200px; }
            .chat-history { padding: 16px; }
            .input-bar { padding: 12px 16px 16px; }
        }
    </style>
</head>
<body>

<div class="app">
    <!-- Sidebar (shown after login) -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">✦</div>
            <div class="logo-text">ChatAIHub</div>
        </div>
        <div class="sidebar-body">
            <button class="btn-new-session" id="newSessionBtn">
                <span>＋</span> 新建会话
            </button>
            <div id="sessionList">
                <div class="empty-session">暂无会话，点击新建</div>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <!-- Topbar -->
        <div class="topbar">
            <span class="topbar-label">API :</span>
            <input class="topbar-input" type="text" id="api-base-url" placeholder="http://localhost:8080">
            <button class="btn-save" id="save-config">保存</button>
            <button class="btn-logout" id="logout-btn">登出</button>
        </div>

        <!-- Content -->
        <div class="content" id="content-area">

            <!-- Auth Panel -->
            <div class="auth-panel" id="auth-panel">
                <div class="auth-header">
                    <div class="auth-logo">✦</div>
                    <div class="auth-title">欢迎使用 ChatAIHub</div>
                    <div class="auth-subtitle">DeepSeek 驱动的智能对话平台</div>
                </div>
                <div class="auth-tabs">
                    <div class="auth-tab active" data-tab="login-password">密码登录</div>
                    <div class="auth-tab" data-tab="login-code">验证码登录</div>
                    <div class="auth-tab" data-tab="register">注册</div>
                </div>

                <!-- 密码登录 -->
                <div class="auth-form active" id="login-password">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="lp-email" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="lp-password" placeholder="请输入密码">
                    </div>
                    <button class="btn-submit" id="login-password-btn">登录</button>
                </div>

                <!-- 验证码登录 -->
                <div class="auth-form" id="login-code">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="lc-email" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label>验证码</label>
                        <div class="code-row">
                            <input type="text" id="lc-code" placeholder="6位验证码">
                            <button class="btn-send-code" id="send-login-code">发送验证码</button>
                        </div>
                    </div>
                    <button class="btn-submit" id="login-code-btn">登录</button>
                </div>

                <!-- 注册 -->
                <div class="auth-form" id="register">
                    <div class="form-group">
                        <label>邮箱</label>
                        <input type="email" id="r-email" placeholder="请输入邮箱">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="r-password" placeholder="6-20位密码">
                    </div>
                    <div class="form-group">
                        <label>验证码</label>
                        <div class="code-row">
                            <input type="text" id="r-code" placeholder="6位验证码">
                            <button class="btn-send-code" id="send-register-code">发送验证码</button>
                        </div>
                    </div>
                    <button class="btn-submit" id="register-btn">注册</button>
                </div>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel" id="chat-panel">
                <div class="chat-history" id="chat-history">
                    <div class="chat-empty" id="chat-empty">
                        <div class="chat-empty-icon">✦</div>
                        <div class="chat-empty-hint">选择或新建一个会话<br>开始与 DeepSeek 对话</div>
                    </div>
                </div>
                <div class="input-bar">
                    <div class="input-bar-top">
                        <select class="mode-select" id="chatMode">
                            <option value="quick">🚀 快速响应</option>
                            <option value="think">🧠 深度推理</option>
                        </select>
                    </div>
                    <textarea class="chat-input" id="chat-input" placeholder="输入消息，Enter 发送，Shift+Enter 换行"></textarea>
                    <div class="input-bar-bottom">
                        <span class="input-hint">Enter 发送 · Shift+Enter 换行</span>
                        <div class="input-actions">
                            <button class="btn-action btn-clear-mem" id="clear-chat">清空记忆</button>
                            <button class="btn-action btn-send" id="send-chat">发 送</button>
                        </div>
                    </div>
                </div>
            </div>

        </div><!-- /content -->
    </div><!-- /main -->
</div><!-- /app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
    // ── Markdown 配置 ──
    marked.setOptions({
        highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true
    });

    function renderMarkdown(text) {
        if (!text) return '';
        const html = marked.parse(text);
        // DOMPurify 防 XSS，但允许 highlight.js 的 class
        const clean = DOMPurify.sanitize(html, {
            ADD_TAGS: ['span'],
            ADD_ATTR: ['class']
        });
        return clean;
    }

    // 为代码块添加复制按钮
    function addCopyButtons(container) {
        container.querySelectorAll('pre').forEach(pre => {
            if (pre.parentElement.classList.contains('code-block-wrapper')) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);

            const btn = document.createElement('button');
            btn.className = 'code-copy-btn';
            btn.textContent = '复制';
            btn.addEventListener('click', () => {
                const code = pre.querySelector('code');
                navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(() => {
                    btn.textContent = '已复制';
                    setTimeout(() => btn.textContent = '复制', 1500);
                });
            });
            wrapper.appendChild(btn);
        });
    }

    // ── State ──
    let apiBaseUrl = localStorage.getItem('apiBaseUrl') || 'http://localhost:8080';
    let token = localStorage.getItem('token') || '';
    let userId = localStorage.getItem('userId') || '';
    let currentSessionId = '';
    let countdownTimers = {};
    let isSending = false;
    let currentStreamController = null; // 用于取消流式请求

    // ── DOM ──
    const $ = id => document.getElementById(id);
    const apiInput    = $('api-base-url');
    const saveBtn     = $('save-config');
    const logoutBtn   = $('logout-btn');
    const authPanel   = $('auth-panel');
    const chatPanel   = $('chat-panel');
    const sidebar     = $('sidebar');
    const sessionList = $('sessionList');
    const newSessBtn  = $('newSessionBtn');
    const chatHistory = $('chat-history');
    const chatEmpty   = $('chat-empty');
    const chatInput   = $('chat-input');
    const sendChatBtn = $('send-chat');
    const clearBtn    = $('clear-chat');
    const modeSelect  = $('chatMode');
    const toastEl     = $('toast');

    // ── Init ──
    function init() {
        apiInput.value = apiBaseUrl;
        bindEvents();
        if (token) {
            showChatPanel();
            loadSessionList();
        }
    }

    function bindEvents() {
        saveBtn.addEventListener('click', saveConfig);
        logoutBtn.addEventListener('click', logout);

        // Auth tabs
        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
                tab.classList.add('active');
                $( tab.dataset.tab ).classList.add('active');
            });
        });

        $('send-login-code').addEventListener('click', () => sendCode('login'));
        $('send-register-code').addEventListener('click', () => sendCode('register'));
        $('login-password-btn').addEventListener('click', loginWithPassword);
        $('login-code-btn').addEventListener('click', loginWithCode);
        $('register-btn').addEventListener('click', register);

        newSessBtn.addEventListener('click', createNewSession);
        sendChatBtn.addEventListener('click', sendChatMessage);
        clearBtn.addEventListener('click', clearChatMemory);

        chatInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChatMessage();
            }
        });

        // Enter key login shortcuts
        $('lp-password').addEventListener('keydown', e => e.key === 'Enter' && loginWithPassword());
        $('lc-code').addEventListener('keydown', e => e.key === 'Enter' && loginWithCode());
        $('r-code').addEventListener('keydown', e => e.key === 'Enter' && register());
    }

    // ── Config ──
    function saveConfig() {
        const url = apiInput.value.trim();
        if (!url) { showToast('请输入 API 地址', 'error'); return; }
        localStorage.setItem('apiBaseUrl', url);
        apiBaseUrl = url;
        showToast('配置已保存', 'success');
    }

    // ── Auth ──
    function sendCode(type) {
        const emailEl = type === 'login' ? $('lc-email') : $('r-email');
        const btn = type === 'login' ? $('send-login-code') : $('send-register-code');
        const email = emailEl.value.trim();
        if (!email) { showToast('请输入邮箱', 'error'); return; }
        if (btn.classList.contains('disabled')) return;
        startCountdown(btn, type);
        fetch(`${apiBaseUrl}/api/auth/send-email-code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        }).then(res => res.json()).then(data => {
            if (data.code === 200) showToast('验证码已发送', 'success');
            else { showToast(data.msg || '发送失败', 'error'); stopCountdown(btn, type); }
        }).catch(() => { showToast('发送失败，请检查网络', 'error'); stopCountdown(btn, type); });
    }

    function startCountdown(btn, key) {
        btn.classList.add('disabled');
        let count = 60;
        btn.textContent = `${count}s 后重发`;
        countdownTimers[key] = setInterval(() => {
            count--;
            btn.textContent = `${count}s 后重发`;
            if (count <= 0) stopCountdown(btn, key);
        }, 1000);
    }

    function stopCountdown(btn, key) {
        clearInterval(countdownTimers[key]);
        btn.classList.remove('disabled');
        btn.textContent = '发送验证码';
    }

    function loginWithPassword() {
        const email = $('lp-email').value.trim();
        const password = $('lp-password').value.trim();
        if (!email || !password) { showToast('请填写邮箱和密码', 'error'); return; }
        fetch(`${apiBaseUrl}/api/auth/login/password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        }).then(res => res.json()).then(data => {
            if (data.code === 200) { saveToken(data.data.token, data.data.userId); showChatPanel(); loadSessionList(); }
            else showToast(data.msg || '登录失败', 'error');
        }).catch(() => showToast('网络异常', 'error'));
    }

    function loginWithCode() {
        const email = $('lc-email').value.trim();
        const code = $('lc-code').value.trim();
        if (!email || !code) { showToast('请填写邮箱和验证码', 'error'); return; }
        fetch(`${apiBaseUrl}/api/auth/login/code`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, code })
        }).then(res => res.json()).then(data => {
            if (data.code === 200) { saveToken(data.data.token, data.data.userId); showChatPanel(); loadSessionList(); }
            else showToast(data.msg || '登录失败', 'error');
        }).catch(() => showToast('网络异常', 'error'));
    }

    function register() {
        const email = $('r-email').value.trim();
        const password = $('r-password').value.trim();
        const code = $('r-code').value.trim();
        if (!email || !password || !code) { showToast('请填写所有字段', 'error'); return; }
        fetch(`${apiBaseUrl}/api/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, code })
        }).then(res => res.json()).then(data => {
            if (data.code === 200) { saveToken(data.data.token, data.data.userId); showChatPanel(); loadSessionList(); }
            else showToast(data.msg || '注册失败', 'error');
        }).catch(() => showToast('网络异常', 'error'));
    }

    function saveToken(t, uid) {
        token = t; userId = uid;
        localStorage.setItem('token', t);
        localStorage.setItem('userId', uid);
    }

    function logout() {
        localStorage.clear();
        token = ''; userId = ''; currentSessionId = '';
        showAuthPanel();
        showToast('已安全登出', 'success');
    }

    // ── Panel Switch ──
    function showChatPanel() {
        authPanel.style.display = 'none';
        // content area: switch to flex column full height
        const ca = $('content-area');
        ca.style.alignItems = 'stretch';
        ca.style.padding = '0';
        chatPanel.style.display = 'flex';
        sidebar.style.display = 'flex';
        logoutBtn.style.display = 'block';
    }

    function showAuthPanel() {
        chatPanel.style.display = 'none';
        sidebar.style.display = 'none';
        logoutBtn.style.display = 'none';
        const ca = $('content-area');
        ca.style.alignItems = 'center';
        ca.style.padding = '24px';
        authPanel.style.display = 'block';
    }

    // ── Session Management ──
    async function loadSessionList() {
        if (!token) return;
        try {
            const res = await fetch(`${apiBaseUrl}/api/ai/deepseek/session/list`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.code === 401) { showToast('登录已过期，请重新登录', 'error'); showAuthPanel(); return; }
            if (data.code !== 200) { showToast('加载会话列表失败', 'error'); return; }
            renderSessionList(data.data);
            // Auto-select first session only if no session is currently selected
            if (!currentSessionId && data.data.length > 0) {
                switchSession(data.data[0].sessionId);
            }
        } catch {
            showToast('网络异常，加载会话失败', 'error');
        }
    }

    function renderSessionList(sessions) {
        sessionList.innerHTML = '';
        if (!sessions || sessions.length === 0) {
            sessionList.innerHTML = '<div class="empty-session">暂无会话，点击新建</div>';
            return;
        }
        sessions.forEach(session => {
            const item = document.createElement('div');
            item.className = `session-item${session.sessionId === currentSessionId ? ' active' : ''}`;
            item.dataset.sessionId = session.sessionId;
            item.textContent = session.sessionTitle || '未命名会话';
            item.addEventListener('click', () => switchSession(session.sessionId));
            sessionList.appendChild(item);
        });
    }

    function switchSession(sessionId) {
        if (!sessionId || sessionId === currentSessionId) return;
        currentSessionId = sessionId;
        document.querySelectorAll('.session-item').forEach(el => {
            el.classList.toggle('active', el.dataset.sessionId === sessionId);
        });
        loadSessionDetail(sessionId);
    }

    async function loadSessionDetail(sessionId) {
        try {
            const res = await fetch(`${apiBaseUrl}/api/ai/deepseek/session/detail?sessionId=${sessionId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.code !== 200) { showToast('加载会话详情失败', 'error'); return; }
            renderHistoryMessages(data.data.historyMessages);
        } catch {
            showToast('加载历史消息失败', 'error');
        }
    }

    function renderHistoryMessages(messages) {
        clearChatUI();
        if (!messages || messages.length === 0) return;
        messages.forEach(msg => {
            if (msg.role === 'user' || msg.role === 'assistant') {
                appendMessage(msg.role, msg.content, false);
            }
        });
        scrollToBottom();
    }

    async function createNewSession() {
        try {
            const res = await fetch(`${apiBaseUrl}/api/ai/deepseek/session/create`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.code !== 200) { showToast('新建会话失败', 'error'); return; }
            currentSessionId = data.data.sessionId;
            clearChatUI();
            await loadSessionList();
            // Highlight the newly created session
            document.querySelectorAll('.session-item').forEach(el => {
                el.classList.toggle('active', el.dataset.sessionId === currentSessionId);
            });
            showToast('新会话已创建', 'success');
        } catch {
            showToast('新建会话失败', 'error');
        }
    }

    // ── Chat (SSE 流式) ──
    async function sendChatMessage() {
        const content = chatInput.value.trim();
        if (!content) { showToast('请输入消息内容', 'warning'); return; }
        if (!currentSessionId) { showToast('请先选择或新建会话', 'warning'); return; }
        if (isSending) return;

        isSending = true;
        sendChatBtn.disabled = true;

        hideChatEmpty();
        appendMessage('user', content);
        chatInput.value = '';

        // 创建空的 AI 消息气泡用于流式填充
        const aiWrap = document.createElement('div');
        aiWrap.className = 'chat-message assistant';
        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = '✦';
        const bubble = document.createElement('div');
        bubble.className = 'message-bubble markdown-body streaming-cursor';
        aiWrap.appendChild(avatar);
        aiWrap.appendChild(bubble);
        chatHistory.appendChild(aiWrap);
        scrollToBottom();

        let fullContent = '';
        const controller = new AbortController();
        currentStreamController = controller;

        try {
            const response = await fetch(`${apiBaseUrl}/api/ai/deepseek/chat/stream`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    sessionId: currentSessionId,
                    mode: modeSelect.value,
                    messages: [{ role: 'user', content }]
                }),
                signal: controller.signal
            });

            // 非 SSE 响应（如 401 等错误）
            const contentType = response.headers.get('content-type') || '';
            if (!contentType.includes('text/event-stream')) {
                const data = await response.json();
                if (data.code === 401) {
                    showToast('登录已过期，请重新登录', 'error');
                    showAuthPanel();
                    aiWrap.remove();
                    return;
                }
                bubble.classList.remove('streaming-cursor');
                bubble.textContent = '⚠️ 错误：' + (data.msg || '请求失败');
                return;
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); // 保留不完整的行

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed) continue;

                    // 解析 SSE 事件
                    if (trimmed.startsWith('event:')) {
                        const eventName = trimmed.substring(6).trim();
                        if (eventName === 'error' || eventName === 'done') {
                            // 下一行 data: 会被处理
                        }
                        continue;
                    }

                    if (!trimmed.startsWith('data:')) continue;
                    const data = trimmed.substring(5).trim();

                    if (data === '[DONE]') continue;

                    // 累加内容并实时渲染 Markdown
                    fullContent += data;
                    bubble.innerHTML = renderMarkdown(fullContent);
                    scrollToBottom();
                }
            }
        } catch (err) {
            if (err.name === 'AbortError') {
                // 用户取消
            } else {
                if (!fullContent) {
                    bubble.textContent = '⚠️ 网络异常，请检查连接后重试';
                }
            }
        } finally {
            bubble.classList.remove('streaming-cursor');
            currentStreamController = null;
            isSending = false;
            sendChatBtn.disabled = false;

            // 最终渲染 + 代码高亮 + 复制按钮
            if (fullContent) {
                bubble.innerHTML = renderMarkdown(fullContent);
                addCopyButtons(bubble);
            }
            scrollToBottom();
            loadSessionList(); // 刷新侧边栏
        }
    }

    function clearChatMemory() {
        if (!currentSessionId) { showToast('请先选择会话', 'warning'); return; }
        fetch(`${apiBaseUrl}/api/ai/deepseek/clear?sessionId=${currentSessionId}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(data => {
            if (data.code === 200) { clearChatUI(); showToast('会话记忆已清空', 'success'); }
            else showToast('清空失败', 'error');
        })
        .catch(() => showToast('网络异常', 'error'));
    }

    // ── UI Helpers ──
    function clearChatUI() {
        chatHistory.innerHTML = '';
        chatHistory.appendChild(chatEmpty);
        chatEmpty.style.display = 'flex';
    }

    function hideChatEmpty() {
        chatEmpty.style.display = 'none';
    }

    function appendMessage(role, content, animate = true) {
        hideChatEmpty();
        const wrap = document.createElement('div');
        wrap.className = `chat-message ${role}`;
        if (!animate) wrap.style.animation = 'none';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = role === 'user' ? '你' : '✦';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        if (role === 'assistant') {
            // AI 回复使用 Markdown 渲染
            bubble.classList.add('markdown-body');
            bubble.innerHTML = renderMarkdown(content);
            // 延迟添加复制按钮（确保 DOM 已渲染）
            setTimeout(() => addCopyButtons(bubble), 0);
        } else {
            // 用户消息保持纯文本（防 XSS）
            bubble.textContent = content;
        }

        wrap.appendChild(avatar);
        wrap.appendChild(bubble);
        chatHistory.appendChild(wrap);
        scrollToBottom();
        return wrap;
    }

    function appendLoadingMessage() {
        hideChatEmpty();
        const wrap = document.createElement('div');
        wrap.className = 'chat-message assistant';

        const avatar = document.createElement('div');
        avatar.className = 'msg-avatar';
        avatar.textContent = '✦';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';
        bubble.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';

        wrap.appendChild(avatar);
        wrap.appendChild(bubble);
        chatHistory.appendChild(wrap);
        scrollToBottom();
        return wrap;
    }

    function scrollToBottom() {
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function showToast(msg, type = 'info') {
        toastEl.textContent = msg;
        toastEl.className = `toast ${type} show`;
        clearTimeout(toastEl._timer);
        toastEl._timer = setTimeout(() => toastEl.classList.remove('show'), 3000);
    }

    init();
</script>
</body>
</html>
